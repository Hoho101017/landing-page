<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EV Car Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="dashboard-frame" aria-label="EV dashboard">
        <img
          id="dashboardImage"
          class="dashboard-image"
          src="./assets/home-default.png"
          alt="EV car dashboard"
        />

        <button
          id="sidebarToggle"
          class="menu-hitbox"
          aria-label="Toggle sidebar"
          aria-expanded="false"
        ></button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
